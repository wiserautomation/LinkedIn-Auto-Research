name: LinkedIn Auto-Research Google-Native Operations

on:
  schedule:
    # Daily at 9:00 AM (Content Creation & Google Brain Sync)
    - cron: '0 9 * * *'
    # Daily at 10:00 AM (Native Metric Scraping & Sheets Ingestion)
    - cron: '0 10 * * *'
    # Weekly on Sundays at 11:00 PM (Google-Native Research Loop)
    - cron: '0 23 * * 0'
  workflow_dispatch: 

jobs:
  google-gtm-run:
    if: github.event.schedule == '0 9 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js & Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Runtime Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser
          python3 -m pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests python-dotenv
          
      - name: Install Node dependencies
        run: npm install
        working-directory: LinkedIn-auto-research
        
      - name: 🚀 Run Google-Native Content & Post
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: |
          node scripts/reddit_trends.js > trends.json
          python3 scripts/lead_gen_agent_v2.py trends.json
          # Note: The above script also creates the Google Doc and logs it 
          node scripts/notion_video_gen.js --out sample_video.mp4
          node scripts/puppeteer_linkedin_post.js "Post Text" "sample_video.mp4"
        working-directory: LinkedIn-auto-research

  google-metrics-sync:
    if: github.event.schedule == '0 10 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 📊 Run Native Metrics Scraper & Sheets Sync
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          # 1. Scrape via Puppeteer
          node scripts/puppeteer_linkedin_metrics.js "https://www.linkedin.com/posts/your-target-url" > metrics.json
          # 2. Ingest to Sheets
          python3 scripts/performance_sync_google.py metrics.json
        working-directory: LinkedIn-auto-research

  sunday-auto-research-google:
    if: github.event.schedule == '0 23 * * 0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🧠 Run Google-Native Research Loop
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python3 scripts/auto_researcher_google.py
        working-directory: LinkedIn-auto-research
