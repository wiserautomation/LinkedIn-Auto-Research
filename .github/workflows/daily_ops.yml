name: LinkedIn Auto-Research Daily Operations

on:
  schedule:
    # Daily at 9:00 AM (Content Creation & Publishing)
    - cron: '0 9 * * *'
    # Daily at 10:00 AM (Metric Sync Tracking)
    - cron: '0 10 * * *'
    # Weekly on Sundays at 11:00 PM (Bio-mimetic Research Loop)
    - cron: '0 23 * * 0'
  workflow_dispatch: # Allow manual triggers

jobs:
  daily-gtm-run:
    if: github.event.schedule == '0 9 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Puppeteer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget ffmpeg
          
      - name: Install dependencies
        run: npm install
        working-directory: LinkedIn-auto-research
        
      - name: Run Reddit Research & Content Generation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
          BLOTATO_ACCOUNT_ID: ${{ secrets.BLOTATO_ACCOUNT_ID }}
        run: |
          node scripts/reddit_trends.js > trends.json
          python3 scripts/lead_gen_agent.py --trends trends.json
          node scripts/notion_video_gen.js --publish
        working-directory: LinkedIn-auto-research

  performance-sync:
    if: github.event.schedule == '0 10 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync Metrics via Apify
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          LINKEDIN_PROFILE_URL: ${{ secrets.LINKEDIN_PROFILE_URL }}
        run: node scripts/performance_sync.js
        working-directory: LinkedIn-auto-research

  sunday-auto-research:
    if: github.event.schedule == '0 23 * * 0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bio-mimetic Loop
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 scripts/auto_researcher.py
        working-directory: LinkedIn-auto-research
