name: LinkedIn Auto-Research Native Operations (No-SaaS)

on:
  schedule:
    # Daily at 9:00 AM (Content Creation & Native Publishing)
    - cron: '0 9 * * *'
    # Daily at 10:00 AM (Native Metric Scraping)
    - cron: '0 10 * * *'
    # Weekly on Sundays at 11:00 PM (Bio-mimetic Research Loop)
    - cron: '0 23 * * 0'
  workflow_dispatch: 

jobs:
  native-gtm-run:
    if: github.event.schedule == '0 9 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Puppeteer Runtime Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget ffmpeg chromium-browser
          
      - name: Install dependencies
        run: npm install
        working-directory: LinkedIn-auto-research
        
      - name: 🚀 Run Native Content & Post
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # Path to the Chromium binary in Ubuntu runner
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: |
          node scripts/reddit_trends.js > trends.json
          python3 scripts/lead_gen_agent.py --trends trends.json
          node scripts/notion_video_gen.js --out sample_video.mp4
          node scripts/puppeteer_linkedin_post.js "Post Text Here" "sample_video.mp4"
        working-directory: LinkedIn-auto-research

  native-metrics-sync:
    if: github.event.schedule == '0 10 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 📊 Run Native Metrics Scraper
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: node scripts/puppeteer_linkedin_metrics.js "https://www.linkedin.com/posts/your-target-url"
        working-directory: LinkedIn-auto-research

  sunday-auto-research:
    if: github.event.schedule == '0 23 * * 0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🧠 Run Bio-mimetic Loop
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python3 scripts/auto_researcher.py
        working-directory: LinkedIn-auto-research
